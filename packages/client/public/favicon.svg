<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none">
  <defs>
    <!-- Amber gradient for the icon tile -->
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(38,92%,58%)"/>
      <stop offset="100%" stop-color="hsl(34,88%,48%)"/>
    </linearGradient>
    <!-- Clip path to round the icon tile -->
    <clipPath id="tileClip">
      <rect x="4" y="4" width="48" height="48" rx="11" ry="11"/>
    </clipPath>
  </defs>

  <!-- ── Icon tile ── -->
  <rect x="4" y="4" width="48" height="48" rx="11" ry="11" fill="url(#amberGrad)"/>

  <!-- Icon drawn at 24×24, centred in the 48×48 tile (origin offset 4+12=16, 4+12=16), scale=2 -->
  <g transform="translate(16,16) scale(2)">
    <!-- Three input streams -->
    <path d="M2 7 C5 7 7 9.5 9.5 11.5"
      stroke="hsl(20,8%,8%)" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.85" fill="none"/>
    <path d="M2 12 L9.5 12"
      stroke="hsl(20,8%,8%)" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.85" fill="none"/>
    <path d="M2 17 C5 17 7 14.5 9.5 12.5"
      stroke="hsl(20,8%,8%)" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.85" fill="none"/>
    <!-- Central gateway diamond -->
    <path d="M12 8.5 L15.5 12 L12 15.5 L8.5 12 Z"
      fill="hsl(20,8%,8%)" fill-opacity="0.85"/>
    <!-- Amber inner diamond -->
    <path d="M12 10.2 L13.8 12 L12 13.8 L10.2 12 Z"
      fill="hsl(38,92%,55%)"/>
    <!-- Single output stream + arrowhead -->
    <path d="M15.5 12 L22 12"
      stroke="hsl(20,8%,8%)" stroke-width="1.6" stroke-linecap="round" stroke-opacity="0.85" fill="none"/>
    <path d="M19.5 10 L22 12 L19.5 14"
      stroke="hsl(20,8%,8%)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85" fill="none"/>
  </g>

  <!-- ── Wordmark ── -->
  <!-- "Conduit" in warm off-white, tracked slightly, aligned to vertical centre -->
  <text
    x="64" y="35"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="600"
    letter-spacing="0.5"
    fill="hsl(30,15%,92%)"
  >Conduit</text>
</svg>
