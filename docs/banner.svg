<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141820;stop-opacity:1" />
    </linearGradient>

    <!-- Accent glow gradient (copper/amber) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>

    <!-- Logo ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.7" />
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <!-- Glow filter for logo -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft edge glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Radial glow behind logo -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Left edge gradient fade -->
  <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0d0f12;stop-opacity:0.8" />
    <stop offset="100%" style="stop-color:#0d0f12;stop-opacity:0" />
  </linearGradient>
  <rect width="300" height="320" fill="url(#leftFade)"/>

  <!-- Right edge gradient fade -->
  <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0d0f12;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#0d0f12;stop-opacity:0.8" />
  </linearGradient>
  <rect x="980" width="300" height="320" fill="url(#rightFade)"/>

  <!-- Ambient center glow -->
  <ellipse cx="640" cy="160" rx="420" ry="200" fill="url(#centerGlow)"/>

  <!-- Connection lines emanating from logo (circuit/network motif) -->
  <!-- Left connections -->
  <line x1="548" y1="160" x2="440" y2="110" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <line x1="548" y1="160" x2="440" y2="160" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <line x1="548" y1="160" x2="440" y2="210" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <!-- Right connections -->
  <line x1="732" y1="160" x2="840" y2="110" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <line x1="732" y1="160" x2="840" y2="160" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  <line x1="732" y1="160" x2="840" y2="210" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>

  <!-- Node dots at line ends -->
  <circle cx="440" cy="110" r="3" fill="#f59e0b" opacity="0.35"/>
  <circle cx="440" cy="160" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="440" cy="210" r="3" fill="#f59e0b" opacity="0.35"/>
  <circle cx="840" cy="110" r="3" fill="#f59e0b" opacity="0.35"/>
  <circle cx="840" cy="160" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="840" cy="210" r="3" fill="#f59e0b" opacity="0.35"/>

  <!-- ── Logo mark ── -->
  <!-- Outer ring -->
  <circle cx="640" cy="160" r="62" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.6" filter="url(#softGlow)"/>
  <!-- Inner ring -->
  <circle cx="640" cy="160" r="50" fill="none" stroke="url(#ringGrad)" stroke-width="0.75" opacity="0.3"/>
  <!-- Logo background disc -->
  <circle cx="640" cy="160" r="46" fill="#1a1e2a" opacity="0.95"/>

  <!-- Conduit "C" flow mark — stylised signal paths -->
  <!-- Outer arc (top) -->
  <path d="M 618 130 Q 640 118 662 130" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Outer arc (bottom) -->
  <path d="M 618 190 Q 640 202 662 190" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Centre bar -->
  <line x1="615" y1="160" x2="665" y2="160" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Left vertical tick -->
  <line x1="618" y1="130" x2="618" y2="190" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- ── Wordmark ── -->
  <text
    x="640"
    y="252"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="36"
    font-weight="700"
    letter-spacing="8"
    text-anchor="middle"
    fill="#f8f8f8"
    opacity="0.92"
  >CONDUIT</text>

  <!-- Tagline -->
  <text
    x="640"
    y="278"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#a0a8b8"
    opacity="0.7"
  >personal communications hub</text>

  <!-- Accent underline below wordmark -->
  <rect x="560" y="259" width="160" height="1" fill="url(#accentGrad)" opacity="0.4" rx="0.5"/>
</svg>
